<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tasting Notes</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
        <line x1="6" y1="2" x2="6" y2="4"/>
        <line x1="10" y1="2" x2="10" y2="4"/>
        <line x1="14" y1="2" x2="14" y2="4"/>
      </svg>
      <h1>Tasting Notes</h1>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="record">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
      </svg>
      記録する
    </button>
    <button class="tab" data-tab="list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
        <line x1="9" y1="9" x2="9" y2="21"/>
      </svg>
      一覧 <span id="list-count" class="count"></span>
    </button>
  </nav>

  <main>
    <!-- Record Tab -->
    <section id="tab-record" class="tab-content active">
      <form id="record-form">

        <div class="field">
          <label>写真（複数枚可）</label>
          <input type="file" id="photo-input" accept="image/*" multiple hidden>
          <div id="photo-thumbnails" class="photo-thumbnails"></div>
          <div class="photo-action-row">
            <button type="button" class="photo-add-btn" id="photo-add-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <span>写真を追加</span>
            </button>
            <button type="button" class="scan-btn" id="scan-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
                <rect x="7" y="7" width="10" height="10" rx="1"/>
              </svg>
              <span>ラベルをスキャン</span>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="bean-name">豆の名前 <span class="required">*</span></label>
          <input type="text" id="bean-name" placeholder="例: エチオピア イルガチェフェ" required>
        </div>

        <div class="field">
          <label for="drink-date">飲んだ日</label>
          <input type="date" id="drink-date">
        </div>

        <div class="field">
          <label for="roaster">ロースター名</label>
          <input type="text" id="roaster" placeholder="例: 丸山珈琲">
        </div>

        <div class="field">
          <label for="origin">産地</label>
          <input type="text" id="origin" placeholder="例: エチオピア" list="origin-list" autocomplete="off">
          <datalist id="origin-list">
            <option value="エチオピア">
            <option value="ケニア">
            <option value="コロンビア">
            <option value="ブラジル">
            <option value="グアテマラ">
            <option value="コスタリカ">
            <option value="パナマ">
            <option value="ペルー">
            <option value="ボリビア">
            <option value="ホンジュラス">
            <option value="エルサルバドル">
            <option value="ニカラグア">
            <option value="メキシコ">
            <option value="ジャマイカ">
            <option value="キューバ">
            <option value="ハワイ">
            <option value="インドネシア">
            <option value="イエメン">
            <option value="インド">
            <option value="パプアニューギニア">
            <option value="フィリピン">
            <option value="ベトナム">
            <option value="タイ">
            <option value="ミャンマー">
            <option value="ルワンダ">
            <option value="タンザニア">
            <option value="ウガンダ">
            <option value="コンゴ">
            <option value="ザンビア">
            <option value="マラウイ">
            <option value="カメルーン">
            <option value="中国（雲南）">
          </datalist>
        </div>

        <div class="field">
          <label for="producer">農園・精製所</label>
          <input type="text" id="producer" placeholder="例: Worka Sakaro Washing Station">
        </div>

        <div class="field">
          <label for="process">精製方法</label>
          <div class="select-wrapper">
            <select id="process">
              <option value="">選択してください</option>
              <option>ウォッシュド</option>
              <option>ナチュラル</option>
              <option>ハニー</option>
              <option>ダブルウォッシュド</option>
              <option>アナエロビックファーメンテーション</option>
              <option value="__other__">その他（手入力）</option>
            </select>
          </div>
          <input type="text" id="process-other" placeholder="精製方法を入力..." hidden style="margin-top:8px">
        </div>

        <div class="field">
          <label>焙煎度: <span id="roast-label">中煎り</span></label>
          <div class="range-row">
            <span class="range-edge">浅煎り</span>
            <input type="range" id="roast-level" min="1" max="5" value="3">
            <span class="range-edge">深煎り</span>
          </div>
        </div>

        <div class="field">
          <label for="brew-method">淹れ方</label>
          <div class="select-wrapper">
            <select id="brew-method">
              <option value="">選択してください</option>
              <option>ハンドドリップ</option>
              <option>フレンチプレス</option>
              <option>エスプレッソ</option>
              <option>エアロプレス</option>
              <option>サイフォン</option>
              <option>コールドブリュー</option>
              <option>モカポット</option>
              <option>カプセル式</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>味の評価</label>
          <div class="radar-wrap">
            <svg id="form-radar" viewBox="0 0 220 220" width="220" height="220" aria-hidden="true"></svg>
          </div>
          <div class="flavor-sliders">
            <div class="flavor-row">
              <span class="flavor-label">苦味</span>
              <input type="range" id="sl-bitterness" min="1" max="5" step="0.5" value="3" class="flavor-slider">
              <span class="flavor-val" id="val-bitterness">3.0/5</span>
            </div>
            <div class="flavor-row">
              <span class="flavor-label">酸味</span>
              <input type="range" id="sl-acidity" min="1" max="5" step="0.5" value="3" class="flavor-slider">
              <span class="flavor-val" id="val-acidity">3.0/5</span>
            </div>
            <div class="flavor-row">
              <span class="flavor-label">甘味</span>
              <input type="range" id="sl-sweetness" min="1" max="5" step="0.5" value="3" class="flavor-slider">
              <span class="flavor-val" id="val-sweetness">3.0/5</span>
            </div>
            <div class="flavor-row">
              <span class="flavor-label">コク</span>
              <input type="range" id="sl-body" min="1" max="5" step="0.5" value="3" class="flavor-slider">
              <span class="flavor-val" id="val-body">3.0/5</span>
            </div>
          </div>
        </div>

        <div class="field">
          <label>フレーバータグ</label>
          <div id="selected-tags" class="selected-tags"></div>
          <button type="button" class="tag-add-btn" id="tag-add-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            フレーバーを追加
          </button>
          <div class="tag-picker" id="tag-picker" hidden>
            <input type="text" id="tag-input" placeholder="タグを入力..." autocomplete="off" maxlength="30">
            <div id="tag-suggestions" class="tag-suggestions"></div>
          </div>
        </div>

        <div class="field">
          <label>お気に入り度</label>
          <div class="star-rating" id="star-rating" role="group" aria-label="お気に入り度">
            <button type="button" class="star" data-value="1" aria-label="星1">☆</button>
            <button type="button" class="star" data-value="2" aria-label="星2">☆</button>
            <button type="button" class="star" data-value="3" aria-label="星3">☆</button>
            <button type="button" class="star" data-value="4" aria-label="星4">☆</button>
            <button type="button" class="star" data-value="5" aria-label="星5">☆</button>
          </div>
          <input type="hidden" id="rating" value="0">
        </div>

        <div class="field">
          <label for="memo">メモ（香りや感想）</label>
          <textarea id="memo" rows="3" placeholder="フルーティーな香り、後味にチョコレート感..."></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 8h1a4 4 0 0 1 0 8h-1"/>
            <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
          </svg>
          <span id="submit-label">記録する</span>
        </button>
      </form>
    </section>

    <!-- List Tab -->
    <section id="tab-list" class="tab-content">
      <div class="list-controls">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="豆名・ロースター・産地で検索...">
        </div>
        <div class="date-range">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <input type="date" id="date-from" aria-label="開始日">
          <span class="date-sep">〜</span>
          <input type="date" id="date-to" aria-label="終了日">
        </div>
        <div class="sort-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <polyline points="5 12 12 5 19 12"/>
            <line x1="6" y1="17" x2="18" y2="17"/>
          </svg>
          <div class="select-wrapper">
            <select id="sort-select">
              <option value="newest">新しい順</option>
              <option value="oldest">古い順</option>
              <option value="rating-desc">お気に入り順</option>
            </select>
          </div>
        </div>
      </div>
      <div id="notes-list"></div>
      <p id="empty-msg" class="empty-msg" hidden>まだ記録がありません</p>
    </section>
  </main>

  <!-- OCR dialog -->
  <dialog id="ocr-dialog">
    <div class="ocr-header">
      <span class="ocr-title">ラベルスキャン</span>
      <button id="ocr-close" aria-label="閉じる">×</button>
    </div>
    <div id="ocr-progress-wrap" class="ocr-progress-wrap">
      <div class="ocr-progress-bar"><div id="ocr-progress-fill"></div></div>
      <p id="ocr-status-text">言語データを読み込み中...</p>
    </div>
    <textarea id="ocr-textarea" rows="7" placeholder="認識結果がここに表示されます" spellcheck="false"></textarea>
    <p class="ocr-hint">テキストを選択してからボタンを押すか、そのまま全文を割り当て</p>
    <div class="ocr-assign-btns">
      <button type="button" class="ocr-assign" data-field="bean-name">豆の名前</button>
      <button type="button" class="ocr-assign" data-field="roaster">ロースター</button>
      <button type="button" class="ocr-assign" data-field="origin">産地</button>
      <button type="button" class="ocr-assign" data-field="producer">農園・精製所</button>
      <button type="button" class="ocr-assign" data-field="memo" data-append="true">メモに追加</button>
    </div>
  </dialog>

  <!-- Delete confirm dialog -->
  <dialog id="confirm-dialog">
    <p>この記録を削除しますか？</p>
    <div class="dialog-actions">
      <button id="confirm-cancel">キャンセル</button>
      <button id="confirm-ok" class="danger">削除</button>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
